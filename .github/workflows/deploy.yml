name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  # 允許手動觸發執行
  workflow_dispatch:

# 設定權限，允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同時間只能有一個 Pages 部署在執行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 指定上傳 teaching-site 目錄的內容
          path: './teaching-site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
