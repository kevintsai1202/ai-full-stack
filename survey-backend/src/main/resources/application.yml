spring:
  application:
    name: survey-backend
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://127.0.0.1:5432/survey}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    # 全新空白資料庫：不要 baseline，否則會跳過 V1 導致 validate 找不到資料表
server:
  port: ${PORT:8080}
app:
  admin-api-key: ${ADMIN_API_KEY:dev-admin-key}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5174,http://localhost:5174}
